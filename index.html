<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정밀 위치 주소 확인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }
        .widget-card {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .pulse-ring {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-[2.5rem] p-8 widget-card border border-gray-100">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">현위치 알리미</h1>
                <p class="text-sm text-gray-500 mt-1">고정밀 GPS 모드 활성 중</p>
            </div>
            <button id="refreshBtn" class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </header>

        <main class="space-y-6">
            <!-- 상태 인디케이터 -->
            <div id="loadingBox" class="flex flex-col items-center py-6">
                <div class="relative flex h-20 w-20 mb-4">
                    <span class="pulse-ring absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-20 w-20 bg-blue-500 items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z" clip-rule="evenodd" />
                        </svg>
                    </span>
                </div>
                <p id="statusLabel" class="text-blue-600 font-semibold">위치 신호 최적화 중...</p>
                <p id="accuracyLabel" class="text-xs text-gray-400 mt-2 font-mono">오차 범위 측정 중</p>
            </div>

            <!-- 주소 정보 카드 -->
            <div id="infoBox" class="hidden animate-in fade-in duration-500">
                <div class="bg-slate-900 rounded-3xl p-6 text-white mb-4">
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-xs font-medium text-slate-400 uppercase tracking-widest">현재 위치 주소</span>
                        <div class="flex items-center gap-1">
                            <span id="finalAccuracy" class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full border border-green-500/30 font-mono"></span>
                        </div>
                    </div>
                    <p id="fullAddress" class="text-xl font-semibold leading-snug break-keep">주소를 변환하는 중입니다...</p>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 uppercase mb-1 font-bold">LATITUDE</p>
                        <p id="latText" class="font-mono text-gray-800">-</p>
                    </div>
                    <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl">
                        <p class="text-[10px] text-gray-400 uppercase mb-1 font-bold">LONGITUDE</p>
                        <p id="lonText" class="font-mono text-gray-800">-</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="mt-10">
            <button id="copyBtn" class="w-full bg-gray-100 text-gray-800 font-bold py-4 rounded-2xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                주소 복사
            </button>
            <div id="toast" class="invisible fixed bottom-10 left-1/2 -translate-x-1/2 bg-black/80 text-white text-xs px-4 py-2 rounded-full transition-all">주소가 복사되었습니다.</div>
        </footer>
    </div>

    <script>
        const loadingBox = document.getElementById('loadingBox');
        const infoBox = document.getElementById('infoBox');
        const statusLabel = document.getElementById('statusLabel');
        const accuracyLabel = document.getElementById('accuracyLabel');
        const finalAccuracy = document.getElementById('finalAccuracy');
        const fullAddress = document.getElementById('fullAddress');
        const latText = document.getElementById('latText');
        const lonText = document.getElementById('lonText');
        const refreshBtn = document.getElementById('refreshBtn');
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');

        let watchId = null;
        let bestPosition = null;
        let measurementCount = 0;

        function showToast() {
            toast.classList.remove('invisible', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('invisible', 'opacity-0');
            }, 2000);
        }

        async function getAddress(lat, lon) {
            try {
                // Nominatim API - 한국어 주소 구성 최적화
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ko`, {
                    headers: { 'User-Agent': 'HighAccuracyAddrApp/2.0' }
                });
                const data = await res.json();
                
                if (data.address) {
                    const a = data.address;
                    // 대단위 -> 소단위 순서 및 필수 정보 위주 구성
                    const parts = [
                        a.province || a.city_district || a.state,
                        a.city || a.town || a.village || a.county,
                        a.borough || a.district,
                        a.suburb || a.neighbourhood,
                        a.road,
                        a.house_number
                    ].filter(p => p);
                    return parts.join(' ');
                }
                return "주소를 변환할 수 없습니다.";
            } catch (e) {
                return "네트워크 오류가 발생했습니다.";
            }
        }

        function startPositioning() {
            // 초기화
            loadingBox.classList.remove('hidden');
            infoBox.classList.add('hidden');
            statusLabel.textContent = "신호 최적화 중...";
            measurementCount = 0;
            bestPosition = null;

            if (watchId) navigator.geolocation.clearWatch(watchId);

            // watchPosition으로 지속적인 위치 갱신 관찰
            watchId = navigator.geolocation.watchPosition(
                async (pos) => {
                    measurementCount++;
                    const acc = pos.coords.accuracy;
                    accuracyLabel.textContent = `현재 오차: ±${Math.round(acc)}m`;

                    // 더 정확한(오차가 적은) 위치 정보로 갱신
                    if (!bestPosition || acc < bestPosition.coords.accuracy) {
                        bestPosition = pos;
                    }

                    // 오차 범위가 20m 이내로 들어오거나 5번 이상 측정 시 확정
                    if (acc < 20 || measurementCount > 5) {
                        finishPositioning();
                    }
                },
                (err) => {
                    statusLabel.textContent = "GPS 신호를 찾을 수 없습니다.";
                    accuracyLabel.textContent = "설정에서 위치 권한을 확인해주세요.";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
            );

            // 최대 8초만 대기 후 자동 확정
            setTimeout(() => {
                if (watchId) finishPositioning();
            }, 8000);
        }

        async function finishPositioning() {
            if (!watchId) return;
            navigator.geolocation.clearWatch(watchId);
            watchId = null;

            if (bestPosition) {
                const { latitude, longitude, accuracy } = bestPosition.coords;
                latText.textContent = latitude.toFixed(6);
                lonText.textContent = longitude.toFixed(6);
                finalAccuracy.textContent = `±${Math.round(accuracy)}m`;

                statusLabel.textContent = "주소 변환 중...";
                const addr = await getAddress(latitude, longitude);
                
                fullAddress.textContent = addr;
                loadingBox.classList.add('hidden');
                infoBox.classList.remove('hidden');
            } else {
                statusLabel.textContent = "위치 탐색 실패";
            }
        }

        refreshBtn.addEventListener('click', startPositioning);
        copyBtn.addEventListener('click', () => {
            const el = document.createElement('textarea');
            el.value = fullAddress.textContent;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast();
        });

        window.onload = startPositioning;
    </script>
</body>
</html>
