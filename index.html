<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>현재 위치 주소 확인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f8fafc;
        }
        .widget-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }
        .loader {
            border-top-color: #3b82f6;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-white rounded-3xl p-8 widget-card">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-bold text-gray-800">현재 위치 정보</h1>
            <button id="refreshBtn" class="p-2 hover:bg-gray-100 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </header>

        <main class="space-y-6">
            <!-- 주소 표시 영역 -->
            <div id="statusContainer" class="flex flex-col items-center justify-center py-10">
                <div id="loadingSpinner" class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
                <p id="statusText" class="text-gray-500 text-sm">위치 정보를 불러오는 중입니다...</p>
            </div>

            <div id="addressContainer" class="hidden space-y-4">
                <div class="bg-blue-50 p-6 rounded-2xl border border-blue-100">
                    <p class="text-xs text-blue-500 font-semibold mb-2 uppercase tracking-wider">현위치 주소</p>
                    <p id="fullAddress" class="text-lg font-bold text-gray-800 leading-tight">주소를 찾을 수 없습니다.</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <p class="text-xs text-gray-400 mb-1">위도</p>
                        <p id="latText" class="font-mono text-sm text-gray-700">-</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl">
                        <p class="text-xs text-gray-400 mb-1">경도</p>
                        <p id="lonText" class="font-mono text-sm text-gray-700">-</p>
                    </div>
                </div>
            </div>

            <!-- 하단 알림 박스 -->
            <div id="messageBox" class="hidden p-4 rounded-xl text-sm text-center"></div>
        </main>

        <footer class="mt-8 space-y-3">
            <button id="copyBtn" class="w-full bg-gray-800 text-white font-bold py-4 rounded-2xl hover:bg-gray-700 transition-all flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                </svg>
                주소 복사하기
            </button>
            <p class="text-[10px] text-gray-400 text-center leading-relaxed">
                * GPS 오차범위에 따라 실제 위치와 차이가 있을 수 있습니다.<br>
                * 주소 정보는 OpenStreetMap 데이터를 참조합니다.
            </p>
        </footer>
    </div>

    <script>
        const statusContainer = document.getElementById('statusContainer');
        const addressContainer = document.getElementById('addressContainer');
        const statusText = document.getElementById('statusText');
        const fullAddress = document.getElementById('fullAddress');
        const latText = document.getElementById('latText');
        const lonText = document.getElementById('lonText');
        const refreshBtn = document.getElementById('refreshBtn');
        const copyBtn = document.getElementById('copyBtn');
        const messageBox = document.getElementById('messageBox');

        function showMessage(msg, isError = false) {
            messageBox.textContent = msg;
            messageBox.className = `p-4 rounded-xl text-sm text-center ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            messageBox.classList.remove('hidden');
            setTimeout(() => {
                messageBox.classList.add('hidden');
            }, 3000);
        }

        async function getAddress(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}&accept-language=ko`, {
                    headers: {
                        'User-Agent': 'LocationAddressApp/1.2'
                    }
                });
                
                if (!response.ok) throw new Error('주소 서비스 응답 오류');
                
                const data = await response.json();
                
                if (data.address) {
                    const addr = data.address;
                    // 한국 표준 주소 체계 (큰 단위 -> 작은 단위)
                    // 국명(대한민국)은 생략하고 시/도부터 표시
                    const parts = [
                        addr.province || addr.city_district || addr.state, // 도/광역시
                        addr.city || addr.town || addr.village || addr.county, // 시/군
                        addr.borough || addr.district, // 구
                        addr.suburb || addr.neighbourhood, // 동/면/리
                        addr.road, // 도로명
                        addr.house_number // 건물번호
                    ].filter(part => part); 

                    return parts.join(' ');
                }
                
                return data.display_name || "주소 정보를 찾을 수 없습니다.";
            } catch (error) {
                console.error("Geocoding error:", error);
                return "주소 변환 중 오류가 발생했습니다.";
            }
        }

        function updateLocation() {
            statusContainer.classList.remove('hidden');
            addressContainer.classList.add('hidden');
            statusText.textContent = "정밀 위치 탐색 중...";

            if (!navigator.geolocation) {
                statusText.textContent = "이 브라우저는 위치 서비스를 지원하지 않습니다.";
                document.getElementById('loadingSpinner').classList.add('hidden');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;

                    latText.textContent = lat.toFixed(6);
                    lonText.textContent = lon.toFixed(6);

                    statusText.textContent = "주소 변환 중...";
                    
                    const address = await getAddress(lat, lon);
                    fullAddress.textContent = address;
                    
                    statusContainer.classList.add('hidden');
                    addressContainer.classList.remove('hidden');
                },
                (error) => {
                    let errorMsg = "위치 정보를 가져올 수 없습니다.";
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMsg = "위치 권한을 허용해주세요.";
                            break;
                        default:
                            errorMsg = "위치 정보를 사용할 수 없습니다.";
                    }
                    statusText.textContent = errorMsg;
                    document.getElementById('loadingSpinner').classList.add('hidden');
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        function copyToClipboard(text) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showMessage("주소가 복사되었습니다.");
        }

        refreshBtn.addEventListener('click', updateLocation);
        copyBtn.addEventListener('click', () => {
            copyToClipboard(fullAddress.textContent);
        });

        window.onload = updateLocation;
    </script>
</body>
</html>
